<!doctype html>
<html lang="en">

<head>
	<title>I'm Not A Robot</title>
	<link rel="icon" type="image/png" href="favicon.png">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/cell.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Coral+Pixels&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<meta name="description" content="A memory match game featuring random images from the web for the tiles!">
</head>

<body>
	<div id="splash-container">
		<span id="splash-text"></span>
	</div>
	<div id="continue-prompt">
		<span>Tap to<br>Continue</span>
	</div>
	<div id="grid-container">
		<div id="tooltip">
			<span class="tooltip-text">
				<span id="title">I'm not a robot</span><h1><span id="level-counter">Level 0</span></h1>
			</span>
			
			<div id="tooltip-right">
				<img src="images/faces/1.png" id="face" title="click to reload">
				<span id="score-counter">0.0%</span>
			</div>
			<div id="lives-container">
				<div class="life-slot">
					<img src="images/tabby-life1.gif" class="life" id="life3-gif">
					<img src="images/tabby-life.png" class="life fade-out" id="life3-static">
					<img src="images/snowflake2.png" class="life fade-out" id="life3-dead">
				</div>
				<div class="life-slot">
					<img src="images/tabby-life1.gif" class="life fade-out" id="life2-gif">
					<img src="images/tabby-life.png" class="life" id="life2-static">
					<img src="images/snowflake2.png" class="life fade-out" id="life2-dead">
				</div>
				<div class="life-slot">
					<img src="images/tabby-life1.gif" class="life fade-out" id="life1-gif">
					<img src="images/tabby-life.png" class="life" id="life1-static">
					<img src="images/snowflake2.png" class="life fade-out" id="life1-dead">
				</div>
			</div>
		</div>
		<div id="grid"></div>
	</div>
	<div style="display: none;">
		<img src="images/faces/2.png">
		<img src="images/faces/3a.png">
		<img src="images/faces/3b.png">
		<img src="images/faces/4b.png">
		<img src="images/faces/4b.gif">
		<img src="images/faces/5b.gif">
		<img src="images/faces/7a.png">
		<img src="images/faces/7b.png">
		<img src="images/faces/sophisticated.png">
		<img src="images/faces/sophisticated2.png">
	</div>
	<script type="module" src="js/script.js"></script>
</body>

</html>
