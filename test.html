<!doctype html>
<html lang="en">

<head>
	<title>I'm Not A Robot</title>
	<link rel="icon" type="image/png" href="icon.png">
	<link rel="stylesheet" href="css/reset.css">
	<!--<link rel="stylesheet" href="css/style.css">-->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Coral+Pixels&display=swap" rel="stylesheet">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<meta name="description" content="A memory match game featuring random images from the web for the tiles!">
	<style>
		:root {
			--theme-blue: #4990e2;
			--global-padding: 8px;
			--gap: 8px;
		}
		* {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
		}
		html, body {
			height: 100svh;
			width: 100svw;
			overflow: hidden;
		}
		body {
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			text-rendering: optimizeLegibility;
			-webkit-tap-highlight-color: transparent;
			align-content: center;
			user-select: none;
			background-image: url("../images/bg.gif");
			background-size: cover;
			background-color: rgb(209, 209, 209);
			padding: var(--gap);
		}
		.fade-in {
			opacity: 1 !important;
		}
		#tooltip {
			width: 100%;
			padding: 15px;
			background-color: #4d91ff;
			/*border: var(--gap) solid white;*/
			border-bottom: 0;
			transition:
				background-color 300ms linear, 
				opacity 0.3s ease;
			opacity: 1;
			color: white;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			/* Flex layout */
			display: flex;
			flex-shrink: 0;
			justify-content: space-between;
			align-items: center;
			box-shadow: 0px 10px 10px 0px rgba(0, 0, 0, 0.16);
			z-index: 6;
		}
		#life-counter {
			/*font-weight: bold;*/
			font-size: 70px;
		}
		#tooltip-right {
			margin-left: auto;
			display: flex;
			flex-shrink: 1;
			flex-direction: column;
			align-items: center;
		}
		#lives-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 2px;
		}
		#lives-container .life {
			image-rendering: pixelated;
			height: 25px;
			/*opacity: 0.8;*/
		}

		#tooltip-right img {
			margin-top: auto;
			margin-bottom: auto;
			height: 60px;
			image-rendering: pixelated;
			cursor: pointer;
		}

		#grid-container {
			margin: auto;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: min(100%, 1000px);
			height: 100%;
		}

		#grid {
			aspect-ratio: 1 / 1;
			gap: var(--gap);
			display: grid;
			width: auto;
			height: 100%;
			grid-template-rows: 1;
			grid-template-columns: 1;
		}

		.cell-container {
			position: relative;
			display: flex;
			align-items: flex-end; /* vertical alignment */
			justify-content: center; /* horizontal alignment */
			width: 100%;
			height: 100%;
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			perspective: 1000px;
		}
		.cell-content-container {
			opacity: 0;
			position: absolute;
			width: 100%;
			height: 100%;
			transition: box-shadow 0.1s linear, transform 0.6s, opacity 0.3s ease;
			transform-style: preserve-3d;
		}
		.cell-content-container:hover {
			box-shadow: 0px 0px 18px 4px rgba(0, 0, 0, 0.16);
		}
		.cell-container:hover .cell-content-container {
			transform: rotateX(-180deg);
		}
		.cell-image {
			background-image: url('images/cat.webp');
  			background-color: white;
			position: absolute;
			width: 100%;
			height: 100%;
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			backface-visibility: hidden;
			transform: rotateX(180deg);
		}
		.cell-mask {
			background-image: url('images/robot.png');
  			background-size: cover;
			position: absolute;
			width: 100%;
			height: 100%;
			background-color: rgb(237, 237, 237);
			transition: opacity 0.3s linear;
			backface-visibility: hidden;
			transform: rotateX(0deg);
		}
	</style>
</head>

<body>
	<div id="splash-container" class="expand">
		<span id="splash-text" class="coral-pixels-regular"></span>
	</div>
	<div id="grid-container">
		<div id="tooltip">
			<span class="tooltip-text">
				Find all pairs that are<h1>matching</h1>
			</span>
			
			<div id="tooltip-right">
				<img src="images/faces/1.png" id="face" title="click to reload">
				<span id="level-counter">Level 0</span>
			</div>
			<div id="lives-container">
				<img src="images/snowflake2.png" class="life" id="life3">
				<img src="images/snowflake2.png" class="life" id="life2">
				<img src="images/snowflake2.png" class="life" id="life1">
			</div>
		</div>
		<div id="grid">
			<div class="cell-container">
				<div class="cell-content-container fade-in">
					<div class="cell-image"></div>
					<div class="cell-mask"></div>
					
					<!--<div class="cell-image-overlay fade-in"></div>-->
					<!--<div class="cell-word-display">cat</div>-->
					
				</div>
			</div>
		</div>
	</div>
	<!--<script type="module" src="js/script.js"></script>-->
</body>

</html>
